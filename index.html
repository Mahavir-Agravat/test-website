<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahavir Agravat | Portfolio</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-sub: #6b7280;
            --accent-blue: #3b82f6;
            --accent-dark: #1e40af;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1-fr);
            grid-gap: 15px;
        }

        /* Bento Grid Item Styling */
        .bento-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Main Profile Box */
        .profile-card {
            grid-column: span 4;
            text-align: left;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            background: #e5e7eb;
            margin-bottom: 20px;
            object-fit: cover;
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .tagline { color: var(--text-sub); font-size: 1.1rem; line-height: 1.6; max-width: 600px; }

        /* Buttons */
        .btn-group { margin-top: 25px; display: flex; gap: 10px; }
        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-blue { background: var(--accent-blue); color: white; }
        .btn-white { border: 1px solid #e5e7eb; color: var(--text-main); }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        /* Skills & Stats Boxes */
        .skills-card { grid-column: span 2; }
        .stats-card { grid-column: span 2; background: var(--accent-blue); color: white; }

        /* Social Icons */
        .social-links {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .social-links a {
            font-size: 1.5rem;
            color: var(--text-sub);
            transition: 0.3s;
        }
        .social-links a:hover { color: var(--accent-blue); }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            .profile-card, .skills-card, .stats-card { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Main Profile Section -->
        <div class="bento-card profile-card">
            <img src="https://via.placeholder.com/150" alt="Mahavir" class="profile-img">
            <h1>Mahavir Agravat 👋</h1>
            <p class="tagline">
                A Passionate <b>Mechanical Engineer</b> & Creative Developer. 
                I bridge the gap between heavy machinery and digital code.
            </p>
            
            <div class="social-links">
                <a href="#"><i class="fab fa-linkedin"></i></a>
                <a href="#"><i class="fab fa-github"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
            </div>

            <div class="btn-group">
                <a href="mailto:contact@mahavir.com" class="btn btn-blue"><i class="fas fa-phone"></i> Book A Call</a>
                <a href="#" class="btn btn-white" onclick="alert('Email Copied!')"><i class="fas fa-copy"></i> Copy Email</a>
            </div>
        </div>

        <!-- Skills Section -->
        <div class="bento-card skills-card">
            <h3>Top Skills</h3>
            <p style="margin-top: 10px; color: var(--text-sub);">
                • Mechanical Design (CAD)<br>
                • Web Development (HTML/CSS)<br>
                • Project Management
            </p>
        </div>

        <!-- Stats Section -->
        <div class="bento-card stats-card">
            <h2 style="font-size: 2rem;">2024</h2>
            <p>Mechanical Graduate</p>
            <hr style="margin: 15px 0; opacity: 0.3;">
            <p>Ready for New Challenges</p>
        </div>

    </div>

</body>
</html>
